<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Begreppslista v.15 - Professionell Version</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #f0f4f8; --text-color: #2d3748; --primary-color: #e06c75;
            --card-bg: #ffffff; --border-color: #e2e8f0; --nav-bg: #2d3748;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        nav { background: var(--nav-bg); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { color: #a0aec0; text-decoration: none; margin-right: 15px; font-weight: bold; }
        nav a.active { color: white; border-bottom: 2px solid var(--primary-color); }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; flex: 1; width: 90%; }
        .box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Flashcards */
        .flashcard { width: 100%; height: 280px; perspective: 1000px; margin: 20px 0; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid var(--border-color); border-radius: 15px; padding: 30px; box-sizing: border-box; background: white; }
        .flashcard-back { transform: rotateY(180deg); background: #fdf2f2; font-size: 1.1rem; }

        .btn { background: var(--primary-color); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-secondary { background: #718096; }
        
        .timer-bar { height: 10px; background: #edf2f7; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--primary-color); width: 100%; transition: width 1s linear; }
        
        .option-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border-color); border-radius: 10px; background: white; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary-color); background: #fffafb; }
        .correct { background: #c6f6d5 !important; border-color: #48bb78 !important; color: #22543d; }
        .wrong { background: #fed7d7 !important; border-color: #e53e3e !important; color: #822727; }
        footer { text-align: center; padding: 20px; background: var(--nav-bg); color: white; margin-top: auto; }
    </style>
</head>
<body>

<nav>
    <div>
        <a href="index.html">🏠 Hem</a>
        <a href="#" class="active">📖 Begrepp v.15</a>
    </div>
    <span style="font-size: 0.8rem;">👤 underskoterskavok252</span>
</nav>

<div class="container">
    <div id="study-section" class="box">
        <h2 style="text-align: center; color: var(--primary-color);">📖 Studera Begrepp (19 st)</h2>
        <p style="text-align: center; font-size: 0.9rem; color: #666;">Klicka روی 🌐 för äkta röst (Lexin)</p>
        <div style="text-align: center; margin-bottom: 25px;">
            <button class="btn" onclick="startFlashcards()">Öva Flashcards 🗂️</button>
            <button class="btn btn-secondary" onclick="startQuiz()">Gör Quiz (40s) 🎯</button>
        </div>
        <div id="terms-list"></div>
    </div>

    <div id="flashcard-section" class="box" style="display:none;">
        <h2 style="text-align: center;">🗂️ Flashcards</h2>
        <div class="flashcard" id="f-card" onclick="this.classList.toggle('flipped')">
            <div class="flashcard-inner">
                <div class="flashcard-front"><h2 id="f-front" style="color:var(--primary-color)">Begrepp</h2><small>Klicka för att se förklaring</small></div>
                <div class="flashcard-back"><p id="f-back">Förklaring</p></div>
            </div>
        </div>
        <div style="text-align: center;">
            <button class="btn" style="background:#48bb78" onclick="nextCard()">Kunde det! ✔️</button>
            <button class="btn btn-secondary" onclick="nextCard()">Nästa kort ➡️</button>
            <p id="card-counter" style="font-weight:bold">1/19</p>
            <button class="btn btn-secondary" style="font-size:0.7rem" onclick="location.reload()">Avbryt och gå tillbaka</button>
        </div>
    </div>

    <div id="quiz-section" class="box" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>🎯 Quiz</h3>
            <p style="font-weight:bold">Poäng: <span id="score">0</span>/19</p>
        </div>
        <div class="timer-bar"><div id="timer-fill" class="timer-fill"></div></div>
        <div id="q-text" style="font-weight:bold; margin-bottom:20px; font-size:1.2rem; min-height: 3em;">Laddar...</div>
        <div id="q-options"></div>
        <button id="q-next" class="btn" style="display:none; margin-top:20px; width:100%" onclick="nextQuestion()">Nästa fråga ➡️</button>
    </div>
</div>

<footer>© 2026 - Mohsen Naderi</footer>

<script>
const termsData = [
    { term: "Demokratisk värdegrund", sv: "Alla människor har lika värde, rätt att bli respekterade och rätt att vara delaktiga i samhället." },
    { term: "Lika värde", sv: "Alla människor är olika och har unika förmågor. Det som är olika berikar och behövs." },
    { term: "Likvärdighet", sv: "Något ska vara lika bra för alla. Alla ska ha rätt till samma vård." },
    { term: "Inkludering", sv: "Alla människor får vara med och känna sig delaktiga, oavsett funktionsnedsättning." },
    { term: "Tillgänglighet", sv: "Innebär att alla miljöer i samhället ska vara förberedda på att alla är olika." },
    { term: "Levnadsvillkor", sv: "Handlar om hur en person lever och vilka möjligheter personen har till ett bra liv." },
    { term: "Delaktighet", sv: "Betyder att få vara med, påverka och känna att man är viktig i sitt eget liv." },
    { term: "Delaktighetsmodellen", sv: "Är ett arbetssätt för att stärka inflytande och självbestämmande." },
    { term: "Livskvalitet", sv: "Handlar om brukarens hälsa och välmående. Att känna sig välkommen." },
    { term: "Normer", sv: "Förväntningar, tankar och oskrivna regler om hur någonting ska vara." },
    { term: "Värderingar", sv: "Att man får tycka och tänka som man vill och det styr vad vi gör." },
    { term: "Funktionsförmåga", sv: "Beskriver hur en person fungerar fysiskt, psykiskt, kognitivt och socialt." },
    { term: "Fysisk funktionsförmåga", sv: "Nedsatt rörelseförmåga, nedsatt syn, nedsatt hörsel." },
    { term: "Psykisk funktionsförmåga", sv: "Trauma, sexuellt övergrepp, krig, livssituation." },
    { term: "Kognitiv funktionsförmåga", sv: "Svårt med inlärning, minne, svårt att ta in information." },
    { term: "Social funktionsförmåga", sv: "Svårigheter med att skapa och bibehålla relationer." },
    { term: "Funktionsnedsättning", sv: "Betyder att en funktion är nedsatt och fungerar på ett annorlunda sätt." },
    { term: "Funktionshinder", sv: "Uppstår när omgivningen gör det svårt för en person med funktionsnedsättning." },
    { term: "Självbestämmande", sv: "Betyder att en person får vara med och bestämma över sitt eget liv." }
];

let currentIndex = 0;
let quizScore = 0;
let timer;
let timeLeft = 40;
let shuffledQuiz = [];

// --- Förbättrad Röst (تلفظ شمرده) ---
function speak(text) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'sv-SE';
    u.rate = 0.75; // Långsammare för tydlighet
    u.pitch = 1.0;
    
    const voices = window.speechSynthesis.getVoices();
    const svVoice = voices.find(v => v.lang === 'sv-SE' && (v.name.includes('Google') || v.name.includes('Premium')));
    if (svVoice) u.voice = svVoice;
    
    window.speechSynthesis.speak(u);
}

// --- Skapa listan med Lexin-länkar ---
function populateList() {
    const listDiv = document.getElementById('terms-list');
    listDiv.innerHTML = "";
    termsData.forEach(item => {
        const d = document.createElement('div');
        d.style.padding = "12px"; d.style.borderBottom = "1px solid #eee";
        d.style.display = "flex"; d.style.justifyContent = "space-between"; d.style.alignItems = "center";
        
        const firstWord = item.term.split(' ')[0];
        const lexinUrl = `https://lexin.nada.kth.se/lexin/#searchinfo=0;itemid=0;text=${firstWord};`;
        
        d.innerHTML = `
            <div style="flex:1"><b>${item.term}</b>: ${item.sv}</div>
            <div style="display:flex; gap:10px; margin-left:10px;">
                <button class="btn" style="padding:5px 10px; margin:0;" onclick="speak('${item.term}')">🔊</button>
                <a href="${lexinUrl}" target="_blank" title="Hör äkta röst" style="text-decoration:none; font-size:1.3rem;">🌐</a>
            </div>
        `;
        listDiv.appendChild(d);
    });
}

// --- Flashcard Funktioner ---
function startFlashcards() {
    document.getElementById('study-section').style.display = 'none';
    document.getElementById('flashcard-section').style.display = 'block';
    currentIndex = 0;
    showCard();
}

function showCard() {
    document.getElementById('f-card').classList.remove('flipped');
    document.getElementById('f-front').innerText = termsData[currentIndex].term;
    document.getElementById('f-back').innerText = termsData[currentIndex].sv;
    document.getElementById('card-counter').innerText = `${currentIndex + 1}/19`;
    speak(termsData[currentIndex].term);
}

function nextCard() {
    currentIndex++;
    if (currentIndex < 19) showCard();
    else { confetti(); alert("Bra jobbat! Du har gått igenom alla kort."); location.reload(); }
}

// --- Quiz Funktioner ---
function startQuiz() {
    document.getElementById('study-section').style.display = 'none';
    document.getElementById('quiz-section').style.display = 'block';
    shuffledQuiz = [...termsData].sort(() => Math.random() - 0.5);
    currentIndex = 0; quizScore = 0;
    loadQuestion();
}

function loadQuestion() {
    clearInterval(timer);
    timeLeft = 40;
    document.getElementById('timer-fill').style.width = "100%";
    document.getElementById('q-next').style.display = "none";
    
    const q = shuffledQuiz[currentIndex];
    document.getElementById('q-text').innerText = `Fråga ${currentIndex + 1}/19: Vad betyder "${q.term}"?`;
    speak(q.term);

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer-fill').style.width = (timeLeft / 40) * 100 + "%";
        if (timeLeft <= 0) { clearInterval(timer); checkAns(null, false); }
    }, 1000);

    let opts = [q];
    while(opts.length < 3) {
        const r = termsData[Math.floor(Math.random()*19)];
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);

    const div = document.getElementById('q-options');
    div.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = o.sv;
        b.onclick = () => checkAns(b, o === q);
        div.appendChild(b);
    });
}

function checkAns(btn, correct) {
    clearInterval(timer);
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
    if(correct) {
        if(btn) btn.classList.add('correct');
        quizScore++;
        document.getElementById('score').innerText = quizScore;
    } else {
        if(btn) btn.classList.add('wrong');
        document.querySelectorAll('.option-btn').forEach(b => {
            if(b.innerText === shuffledQuiz[currentIndex].sv) b.classList.add('correct');
        });
    }
    document.getElementById('q-next').style.display = "block";
}

function nextQuestion() {
    currentIndex++;
    if (currentIndex < 19) loadQuestion();
    else {
        confetti();
        document.getElementById('quiz-section').innerHTML = `<h2>Klar! Poäng: ${quizScore}/19</h2><button class="btn" onclick="location.reload()">Hem</button>`;
    }
}

window.onload = () => {
    populateList();
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
};
</script>

</body>
</html>
